<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="card">
    <div class="logo" style="display: flex; align-items: center; flex-direction: row; ">
      Kaleido
      <img src="../icons/kaleido_logo128.png" style="height: 48px; width: 48px; margin-left: 12px;" alt="Kaleido logo" class="logo-icon"></div>
    <div class="field">
      <label for="llm-select">Switch to →</label>
      <select id="llm-select">
        <option value="chatgpt">ChatGPT</option>
        <option value="gemini">Gemini</option>
        <option value="claude">Claude</option>
        <option value="grok">Grok</option>
        <option value="deepseek">DeepSeek</option>
        <option value="perplexity">Perplexity</option>
        <option value="copilot">Copilot</option>
      </select>
    </div>
    <div class="field">
      <label for="next-question">What did you want to ask next?</label>
      <textarea id="next-question" placeholder="Type your next question..."></textarea>
    </div>
    <button id="switch-btn">Generate &amp; Switch</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
